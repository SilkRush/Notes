<!DOCTYPE html>
<html>
<head>
  <title>My Notes</title>
  <style>
    body {
      font-family: Arial;
      max-width: 800px;
      margin: auto;
      padding: 20px;
      background: #f5f5f5;
    }
    h1 {
      text-align: center;
    }
    .note {
      background: white;
      padding: 15px;
      margin: 10px 0;
      border-radius: 10px;
      box-shadow: 0 2px 5px rgba(0,0,0,0.1);
    }
    a {
      text-decoration: none;
      color: #333;
      font-weight: bold;
    }
  </style>
</head>
<body>

<h1>📚 My Notes</h1>
<div id="notesList"></div>

<script>
const username = "SilkRush";
const repo = "Notes";
const folder = "notes";

const apiURL = `https://api.github.com/repos/${username}/${repo}/contents/${folder}`;

fetch(apiURL)
  .then(res => res.json())
  .then(data => {
    const container = document.getElementById("notesList");

    data.forEach(file => {
      if (file.name.endsWith(".html")) {
        const div = document.createElement("div");
        div.className = "note";

        const link = document.createElement("a");
        link.href = `./notes/${file.name}`;

        // Make title pretty
        link.textContent = file.name
          .replace(".html", "")
          .replace(/-/g, " ");

        div.appendChild(link);
        container.appendChild(div);
      }
    });
  });
</script>

</body>
</html>
